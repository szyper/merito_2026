<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RGB Color</title>

<style>
body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background-color: #eef3f7;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:350px;
}

input[type=range]{
    width:100%; /* Suwak na całą szerokość */
    margin:10px 0;
}

#colorBox{
    width:100%;
    height:100px;
    margin-top:20px;
    border-radius:10px;
    border:1px solid #ccc;
}

.valueLabel{
    font-weight:bold;
    margin-bottom:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>RGB Color</h2>

<!-- Suwak dla czerwonej -->
<div class="valueLabel">Red: <span id="redValue">128</span></div>
<input type="range" min="0" max="255" value="128" id="redSlider" oninput="updateColor()">

<!-- Suwak dla zielonej -->
<div class="valueLabel">Green: <span id="greenValue">128</span></div>
<input type="range" min="0" max="255" value="128" id="greenSlider" oninput="updateColor()">

<!-- Suwak dla niebieskiej -->
<div class="valueLabel">Blue: <span id="blueValue">128</span></div>
<input type="range" min="0" max="255" value="128" id="blueSlider" oninput="updateColor()">

<!-- Suwak dla przeźroczystości -->
<div class="valueLabel">Alpha: <span id="alphaValue">1</span></div>
<input type="range" min="0" max="1" step="0.01" value="1" id="alphaSlider" oninput="updateColor()">

<!-- Div, którego kolor będzie się zmieniał -->
<div id="colorBox"></div>

</div>

<script>
// Funkcja aktualizująca kolor diva w czasie rzeczywistym
function updateColor(){
    // Pobranie wartości ze wszystkich trzech suwaków
    let r = document.getElementById("redSlider").value;
    let g = document.getElementById("greenSlider").value;
    let b = document.getElementById("blueSlider").value;
    let a = document.getElementById("alphaSlider").value;

    // Wyświetlenie aktualnych wartości RGB oraz alpha
    document.getElementById("redValue").innerHTML = r;
    document.getElementById("greenValue").innerHTML = g;
    document.getElementById("blueValue").innerHTML = b;
    document.getElementById("alphaValue").innerHTML = a;

    // Zmiana koloru tła diva na podstawie RGB oraz przeźroczystości
    // document.getElementById("colorBox").style.backgroundColor = "rgba(" + r + "," + g + "," + b + "," + a +")";
    document.getElementById("colorBox").style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a})`;
}

// Uruchomienie funkcji przy wczytaniu strony, żeby div miał kolor startowy
updateColor();
</script>

</body>
</html>
