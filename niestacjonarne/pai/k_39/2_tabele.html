<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabele</title>
  <link rel="stylesheet" href="./2_table.css">
</head>
<body>
  <table>
    <tr>
      <th>Imię</th>
      <th>Nazwisko</th>
      <th>Wiek</th>
    </tr>
    <tr>
      <td>Janusz</td>
      <td>Nowak</td>
      <td>20</td>
    </tr>
    <tr>
      <td>Paweł</td>
      <td>Nowak</td>
      <td>20</td>
    </tr>
    <tr>
      <td>Janusz</td>
      <td>Kowalski</td>
      <td>30</td>
    </tr>
  </table><hr>

  <table>
    <caption>Lista pracowników</caption>
    <thead>
      <tr>
        <th>Identyfikator</th>
        <th>Nazwisko</th>
        <th>Kierownik</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>001</td>
        <td>Nowak</td>
        <td>Kierownik</td>
      </tr>
      <tr>
        <td>002</td>
        <td>Kowalska</td>
        <td>Dyrektor</td>
      </tr>
      <tr>
        <td>003</td>
        <td>Nowak</td>
        <td>Prezes</td>
      </tr>
      <tr>
        <td>004</td>
        <td>Kowal</td>
        <td>Kierownik</td>
      </tr>
    </tbody>
  </table>

  <table>
    <thead>
      <tr>
        <th rowspan="2">Kategoria</th>
        <th colspan="2">Wyniki</th>
      </tr>
      <tr>
        <th>2025</th>
        <th>2026</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Sprzedaż</td>
        <td>5000</td>
        <td>6000</td>
      </tr>
      <tr>
        <td>Marketing</td>
        <td>3000</td>
        <td>4000</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
