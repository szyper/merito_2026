<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularz</title>
  <link rel="stylesheet" href="./7_form.css">
</head>
<body>
  <h2>Formularz kontaktowy</h2>
  <form action="#" method="get">
    <label for="name">Imię</label>
    <input type="text" name="name" id="name" minlength="2" maxlength="20" placeholder="Janusz" autofocus>

    <label for="surname">Nazwisko</label>
    <input type="text" name="surname" id="surname" minlength="2" maxlength="50" placeholder="Nowak">

    <label for="age">Wiek</label>
    <input type="number" name="age" id="age" min="0" max="140" placeholder="18">

    <label for="phone">Numer telefonu</label>
    <input type="tel" name="phone" id="phone" placeholder="123-456-789">

    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="jan@o2.pl">

    <label for="password">Hasło</label>
    <input type="password" name="password" id="password" placeholder="Hasło">

    <label for="confirmPassword">Hasło</label>
    <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Potwierdź hasło">

    <label for="subject">Wiadomość</label>
    <input type="text" name="subject" id="subject" placeholder="Wpisz temat wiadomości">

    <label for="color">Ulubiony kolor</label>
    <input type="color" name="color" id="color">

    <label for="topic">Wybierz kategorię</label>
    <select name="topic" id="topic">
      <option value="">-- wybierz --</option>
      <option value="support">Pomoc techniczna</option>
      <option value="offer">Oferta handlowa</option>
      <option value="feedback">Opinia</option>
    </select>

    <label for="date">Preferowana data kontaktu</label>
    <input type="date" name="date" id="date" min="1800-01-01" max="2026-12-31">

    <!-- płeć -->
    <label>Płeć</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="gender" value="male">
        <span>Mężczyzna</span>
      </label>

      <label class="radio-option">
        <input type="radio" name="gender" value="female">
        <span>Kobieta</span>
      </label>

      <label class="radio-option">
        <input type="radio" name="gender" value="other">
        <span>Inna / wolę nie odpowiadać</span>
      </label>
    </div>

    <label for="message">Wiadomość</label>
    <textarea name="message" id="message" rows="4" placeholder="Wpisz treść wiadomości ..."></textarea>

    <!-- zainteresowania -->
     <label>Zainteresowania</label>
     <div class="checkbox-group">
      <label class="checkbox-option">
        <input type="checkbox" name="hobby" value="sport">
        <span>Sport</span>
      </label>

      <label class="checkbox-option">
        <input type="checkbox" name="hobby" value="music">
        <span>Muzyka</span>
      </label>

      <label class="checkbox-option">
        <input type="checkbox" name="hobby" value="games">
        <span>Gry</span>
      </label>
     </div>

    <label for="satisfaction">Jak oceniasz naszą obsługę? (1-10)</label>
    <div class="range-group">
      <input type="range" name="satisfaction" id="satisfaction" min="1" max="10" value="5">
      <span id="rangeValue">5</span>
    </div>

    <label>
      <input type="checkbox" name="consent">
      Zgadzam się na przetwarzanie danych osobowych
    </label>
    <button type="submit">Wyślij</button>
  </form>
</body>
</html>
