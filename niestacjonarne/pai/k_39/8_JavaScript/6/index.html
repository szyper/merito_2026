<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeliczanie temperatury</title>
</head>
<body>
    <div class="container">
        <h2>Fahrenheit -> Celsjusz</h2>
        <form>
            Podaj temperaturę w °F:<br>
            <input type="range" oninput="convertTemperature()" id="slider" value="32" min="-40" max="212"><br>
        </form>
        <p id="result"></p>
    </div>
    <script>
        function convertTemperature(){
            let fahrenheitValue = document.getElementById("slider").value;
            let calsiusValue = (fahrenheitValue - 32) * 5 / 9;

            document.getElementById("result").innerHTML = "Temperatura w °C: " + calsiusValue.toFixed(2);
            // body > zmiana stylu (backgroundColor)
            
        }
    </script>
</body>
</html>
